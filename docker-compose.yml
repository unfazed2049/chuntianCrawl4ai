services:
  prefect-server:
    build:
      context: .
      dockerfile: Dockerfile.prefect
    container_name: chuntian-prefect-server
    restart: unless-stopped
    environment:
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
      PREFECT_UI_API_URL: ${PREFECT_UI_API_URL:-/api}
    command: ["prefect", "server", "start", "--host", "0.0.0.0", "--port", "4200"]
    ports:
      - "${PREFECT_SERVER_PORT:-4200}:4200"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 20

  prefect-deploy:
    build:
      context: .
      dockerfile: Dockerfile.prefect
    container_name: chuntian-prefect-deploy
    restart: "no"
    env_file:
      - .env
    environment:
      PREFECT_API_URL: ${PREFECT_API_URL:-http://prefect-server:4200/api}
      PREFECT_WORK_POOL: ${PREFECT_WORK_POOL:-crawler-pool}
    command:
      [
        "bash",
        "-lc",
        "prefect work-pool create ${PREFECT_WORK_POOL:-crawler-pool} --type process || true; prefect deploy --all",
      ]
    depends_on:
      prefect-server:
        condition: service_healthy

  prefect-worker:
    build:
      context: .
      dockerfile: Dockerfile.prefect
    container_name: chuntian-prefect-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PREFECT_API_URL: ${PREFECT_API_URL:-http://prefect-server:4200/api}
      PREFECT_WORK_POOL: ${PREFECT_WORK_POOL:-crawler-pool}
      MEILI_URL: http://meilisearch:7700
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command:
      ["prefect", "worker", "start", "--pool", "${PREFECT_WORK_POOL:-crawler-pool}", "--type", "process"]
    depends_on:
      prefect-server:
        condition: service_healthy
      prefect-deploy:
        condition: service_completed_successfully
      meilisearch:
        condition: service_healthy
      meili-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - ./output:/app/output
      - ./config:/app/config:ro

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: chuntian-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_API_KEY:-master-key}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - ./meili_data:/meili_data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS -H \"Authorization: Bearer $$MEILI_MASTER_KEY\" http://localhost:7700/health >/dev/null || curl -fsS http://localhost:7700/health >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 10

  meili-init:
    image: curlimages/curl:8.12.1
    container_name: chuntian-meili-init
    restart: "no"
    environment:
      MEILI_MASTER_KEY: ${MEILI_API_KEY:-master-key}
    command:
      [
        "sh",
        "-ec",
        "for i in $(seq 1 30); do curl -fsS -H \"Authorization: Bearer $$MEILI_MASTER_KEY\" http://meilisearch:7700/health >/dev/null && break; sleep 2; done; curl -fsS -X PATCH http://meilisearch:7700/experimental-features -H \"Authorization: Bearer $$MEILI_MASTER_KEY\" -H \"Content-Type: application/json\" --data-binary '{\"vectorStore\": true}' >/dev/null; curl -fsS -H \"Authorization: Bearer $$MEILI_MASTER_KEY\" http://meilisearch:7700/experimental-features",
      ]
    depends_on:
      meilisearch:
        condition: service_healthy

  redis:
    image: redis/redis-stack-server:latest
    container_name: chuntian-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-stack-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: chuntian-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MEILI_URL: http://meilisearch:7700
      MEILI_API_KEY: ${MEILI_API_KEY:-master-key}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      meilisearch:
        condition: service_healthy
      meili-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chuntian-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8081:80"

volumes:
  redis_data:
